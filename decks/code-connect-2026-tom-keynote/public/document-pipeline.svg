<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 400" role="img">
  <title>A document as a pipeline</title>
  <desc>Two zones joined by an approval gate. Left zone, "Codebase": one or more Agents and a Human work on a
    git-persisted codebase made of three parts — Source files, Long-term memory, and Work in progress. Agents touch
    all three; the human contributes to Work. An iterate loop closes the cycle. Right zone, "Release": once approved,
    the sources flow through Render, then Publish, then Distribute.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6"
      orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round"
        stroke-linejoin="round" />
    </marker>
    <style>
      .th {
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 16px;
        font-weight: 600;
      }

      .ts {
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 400;
      }

      .tlabel {
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 1.5px;
      }

      .tgate {
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 600;
      }

      .tm {
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
        font-weight: 600;
      }
    </style>
  </defs>

  <!-- ═══ ZONE 1: codebase ═══ -->
  <rect x="20" y="28" width="390" height="344" rx="18" fill="#EEF2FF" stroke="#4D7EF7" stroke-width="0.75" />
  <text class="tlabel" x="40" y="54" fill="#1D3476">CODEBASE</text>

  <!-- agents -->
  <rect x="48" y="92" width="150" height="60" rx="10" fill="#FFFFFF" stroke="#4D7EF7" stroke-width="0.75" />
  <text class="th" x="123" y="128" text-anchor="middle" fill="#1A1F2E">Agents</text>

  <!-- human -->
  <rect x="48" y="290" width="150" height="60" rx="10" fill="#FFFFFF" stroke="#6B7280" stroke-width="0.75" />
  <text class="th" x="123" y="326" text-anchor="middle" fill="#1A1F2E">Human</text>

  <!-- source: a stack of source files (focal) -->
  <rect x="248" y="72" width="146" height="76" rx="14" fill="#1E3155" stroke="#4D7EF7" stroke-width="0.75" />
  <rect x="240" y="78" width="146" height="76" rx="14" fill="#1A2B49" stroke="#4D7EF7" stroke-width="0.75" />
  <rect x="232" y="84" width="146" height="76" rx="14" fill="#162440" stroke="#4D7EF7" stroke-width="1" />
  <text class="th" x="305" y="128" text-anchor="middle" fill="#FFFFFF">Sources</text>

  <!-- long-term memory: also git-persisted -->
  <rect x="232" y="182" width="146" height="72" rx="12" fill="#162440" stroke="#4D7EF7" stroke-width="0.75" />
  <text class="tm" x="305" y="222" text-anchor="middle" fill="#FFFFFF">Long-term memory</text>

  <!-- work in progress: also git-persisted -->
  <rect x="232" y="278" width="146" height="72" rx="12" fill="#162440" stroke="#4D7EF7" stroke-width="0.75" />
  <text class="th" x="305" y="318" text-anchor="middle" fill="#FFFFFF">Work</text>

  <!-- connectors drawn AFTER the boxes so arrowheads sit on top -->
  <!-- iterate loop: codebase back to agents -->
  <path d="M305 84 C305 44, 205 38, 128 86" fill="none" stroke="#4D7EF7" stroke-width="1.5"
    marker-end="url(#arrow)" />
  <text class="ts" x="210" y="44" text-anchor="middle" fill="#4D7EF7">iterate</text>

  <!-- agents → source / memory / work (agents touch everything) -->
  <line x1="200" y1="116" x2="229" y2="124" stroke="#4D7EF7" stroke-width="1.5" fill="none"
    marker-end="url(#arrow)" />
  <line x1="200" y1="124" x2="229" y2="212" stroke="#4D7EF7" stroke-width="1.5" fill="none"
    marker-end="url(#arrow)" />
  <line x1="200" y1="130" x2="229" y2="306" stroke="#4D7EF7" stroke-width="1.5" fill="none"
    marker-end="url(#arrow)" />
  <!-- human → work only -->
  <line x1="200" y1="322" x2="229" y2="318" stroke="#6B7280" stroke-width="1.5" fill="none"
    marker-end="url(#arrow)" />
  <text class="ts" x="214" y="312" text-anchor="middle" fill="#6B7280">review</text>

  <!-- ═══ ZONE 2: release ═══ -->
  <rect x="440" y="28" width="460" height="344" rx="18" fill="#F6F8FB" stroke="#9CA3AF" stroke-width="0.5" />
  <text class="tlabel" x="460" y="54" fill="#6B7280">RELEASE</text>

  <!-- render → publish → distribute -->
  <line x1="588" y1="210" x2="608" y2="210" stroke="#6B7280" stroke-width="1.5" fill="none"
    marker-end="url(#arrow)" />
  <line x1="736" y1="210" x2="756" y2="210" stroke="#6B7280" stroke-width="1.5" fill="none"
    marker-end="url(#arrow)" />

  <rect x="462" y="158" width="126" height="104" rx="12" fill="#FFFFFF" stroke="#4D7EF7" stroke-width="0.75" />
  <text class="th" x="525" y="215" text-anchor="middle" fill="#1A1F2E">Render</text>

  <rect x="610" y="158" width="126" height="104" rx="12" fill="#FFFFFF" stroke="#4D7EF7" stroke-width="0.75" />
  <text class="th" x="673" y="215" text-anchor="middle" fill="#1A1F2E">Publish</text>

  <rect x="758" y="158" width="126" height="104" rx="12" fill="#FFFFFF" stroke="#4D7EF7" stroke-width="0.75" />
  <text class="th" x="821" y="215" text-anchor="middle" fill="#1A1F2E">Distribute</text>

  <!-- ═══ GATE (drawn last so it sits above both panels) ═══ -->
  <line x1="402" y1="210" x2="459" y2="210" stroke="#22C55E" stroke-width="1.75" fill="none"
    marker-end="url(#arrow)" />
  <text class="tgate" x="430" y="200" text-anchor="middle" fill="#16A34A">approved ✓</text>
</svg>
