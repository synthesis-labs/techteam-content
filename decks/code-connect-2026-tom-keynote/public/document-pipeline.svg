<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 400" role="img">
  <title>A document as a pipeline</title>
  <desc>Two zones joined by an approval gate. Left zone, "Collaborate": one or more Agents and a Human both feed a
    stack of Source files (in git), with an iterate loop closing the cycle. Right zone, "Release": once approved, the
    sources flow through Render, then Publish, then Distribute.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6"
      orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round"
        stroke-linejoin="round" />
    </marker>
    <style>
      .th {
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 16px;
        font-weight: 600;
      }

      .ts {
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 400;
      }

      .tlabel {
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 1.5px;
      }

      .tgate {
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 12px;
        font-weight: 600;
      }

      .tm {
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
        font-weight: 600;
      }
    </style>
  </defs>

  <!-- ═══ ZONE 1: collaborate ═══ -->
  <rect x="20" y="28" width="390" height="344" rx="18" fill="#EEF2FF" stroke="#4D7EF7" stroke-width="0.75" />
  <text class="tlabel" x="40" y="54" fill="#1D3476">COLLABORATE</text>

  <!-- iterate loop: sources back to agents -->
  <path d="M315 150 C315 60, 230 46, 124 72" fill="none" stroke="#4D7EF7" stroke-width="1.5"
    marker-end="url(#arrow)" />
  <text class="ts" x="206" y="48" text-anchor="middle" fill="#4D7EF7">iterate</text>

  <!-- agents → sources -->
  <line x1="198" y1="118" x2="229" y2="190" stroke="#6B7280" stroke-width="1.5" fill="none"
    marker-end="url(#arrow)" />
  <!-- human → sources -->
  <line x1="198" y1="312" x2="229" y2="238" stroke="#6B7280" stroke-width="1.5" fill="none"
    marker-end="url(#arrow)" />

  <!-- agents -->
  <rect x="48" y="72" width="150" height="64" rx="10" fill="#FFFFFF" stroke="#4D7EF7" stroke-width="0.75" />
  <text class="th" x="123" y="110" text-anchor="middle" fill="#1A1F2E">Agents</text>

  <!-- human -->
  <rect x="48" y="292" width="150" height="58" rx="10" fill="#FFFFFF" stroke="#6B7280" stroke-width="0.75" />
  <text class="th" x="123" y="327" text-anchor="middle" fill="#1A1F2E">Human</text>

  <!-- sources: a stack of source files (focal) -->
  <rect x="248" y="148" width="150" height="92" rx="14" fill="#1E3155" stroke="#4D7EF7" stroke-width="0.75" />
  <rect x="240" y="156" width="150" height="92" rx="14" fill="#1A2B49" stroke="#4D7EF7" stroke-width="0.75" />
  <rect x="232" y="164" width="150" height="92" rx="14" fill="#162440" stroke="#4D7EF7" stroke-width="1" />
  <text class="th" x="307" y="216" text-anchor="middle" fill="#FFFFFF">Source</text>

  <!-- long-term memory & decisions: also git-persisted -->
  <rect x="232" y="268" width="150" height="80" rx="12" fill="#162440" stroke="#4D7EF7" stroke-width="0.75" />
  <text class="tm" x="307" y="302" text-anchor="middle" fill="#FFFFFF">Long-term memory</text>
  <text class="ts" x="307" y="324" text-anchor="middle" fill="#A5B4FC">decisions · context</text>

  <!-- ═══ ZONE 2: release ═══ -->
  <rect x="440" y="28" width="460" height="344" rx="18" fill="#F6F8FB" stroke="#9CA3AF" stroke-width="0.5" />
  <text class="tlabel" x="460" y="54" fill="#6B7280">RELEASE</text>

  <!-- render → publish → distribute -->
  <line x1="588" y1="210" x2="608" y2="210" stroke="#6B7280" stroke-width="1.5" fill="none"
    marker-end="url(#arrow)" />
  <line x1="736" y1="210" x2="756" y2="210" stroke="#6B7280" stroke-width="1.5" fill="none"
    marker-end="url(#arrow)" />

  <rect x="462" y="158" width="126" height="104" rx="12" fill="#FFFFFF" stroke="#4D7EF7" stroke-width="0.75" />
  <text class="th" x="525" y="215" text-anchor="middle" fill="#1A1F2E">Render</text>

  <rect x="610" y="158" width="126" height="104" rx="12" fill="#FFFFFF" stroke="#4D7EF7" stroke-width="0.75" />
  <text class="th" x="673" y="215" text-anchor="middle" fill="#1A1F2E">Publish</text>

  <rect x="758" y="158" width="126" height="104" rx="12" fill="#FFFFFF" stroke="#4D7EF7" stroke-width="0.75" />
  <text class="th" x="821" y="215" text-anchor="middle" fill="#1A1F2E">Distribute</text>

  <!-- ═══ GATE (drawn last so it sits above both panels) ═══ -->
  <line x1="402" y1="210" x2="459" y2="210" stroke="#22C55E" stroke-width="1.75" fill="none"
    marker-end="url(#arrow)" />
  <text class="tgate" x="430" y="200" text-anchor="middle" fill="#16A34A">approved ✓</text>
</svg>
